app {

  http {
    host             = "0.0.0.0"
    host             = ${?HTTP_HOST}
    port             = 8080
    port             = ${?HTTP_PORT}
    idle-timeout     = 60 seconds
    shutdown-timeout = 30 seconds   # must be < the platform's termination grace period
    max-connections  = 1024
  }

  db {
    host                     = "localhost"
    host                     = ${?DB_HOST}
    port                     = 5432
    port                     = ${?DB_PORT}
    name                     = "auth"
    name                     = ${?DB_NAME}
    user                     = "auth"
    user                     = ${?DB_USER}
    # No default: a missing DB_PASSWORD must fail the boot, never fall back to blank.
    password                 = ${DB_PASSWORD}
    max-pool-size            = 10           # DB is the bottleneck, not threads; size to the DB, not the CPU
    connect-timeout          = 5 seconds
    max-lifetime             = 30 minutes   # keep below the DB/LB idle cutoff
    leak-detection-threshold = 10 seconds
  }

  auth {
    # Security-critical and environment-specific: required, no insecure defaults.
    issuer   = ${AUTH_ISSUER}
    audience = ${AUTH_AUDIENCE}
    jwks-uri = ${AUTH_JWKS_URI}
  }

  # Named rate-limit policies for @RateLimited (resolved by http.RateLimitRegistry).
  # Token-bucket semantics: `permits` refill continuously over `window`.
  rate-limits {
    default { permits = 100, window = 1 minute }
    # Token endpoints are abuse magnets and each hit costs crypto work: keep tight.
    token   { permits = 10,  window = 1 minute }
  }

  # Distributed token-revocation store (Sage Redis/Valkey client).
  redis {
    mode  = standalone          # standalone | cluster
    mode  = ${?REDIS_MODE}
    nodes = [ { host = "localhost", port = 6379 } ]
    # nodes = [ {host=r1,port=6379}, {host=r2,port=6379} ]  # cluster seeds
    username = "default"
    username = ${?REDIS_USERNAME}
    # No default: in production REDIS_PASSWORD is required; omit it only for local dev.
    password = ${?REDIS_PASSWORD}
    database = 0
    tls      = false            # set true (and provide a real password) in production
    tls      = ${?REDIS_TLS}
    client-name     = "auth-middleware"
    connect-timeout = 10 seconds
    ping-interval   = 60 seconds
    ping-timeout    = 30 seconds
  }
}
