app {

  http {
    host             = "0.0.0.0"
    host             = ${?HTTP_HOST}
    port             = 8080
    port             = ${?HTTP_PORT}
    idle-timeout     = 60 seconds
    shutdown-timeout = 30 seconds   # must be < the platform's termination grace period
    max-connections  = 1024
  }

  db {
    host                     = "localhost"
    host                     = ${?DB_HOST}
    port                     = 5432
    port                     = ${?DB_PORT}
    name                     = "auth"
    name                     = ${?DB_NAME}
    user                     = "auth"
    user                     = ${?DB_USER}
    # No default: a missing DB_PASSWORD must fail the boot, never fall back to blank.
    password                 = ${DB_PASSWORD}
    max-pool-size            = 10           # DB is the bottleneck, not threads; size to the DB, not the CPU
    connect-timeout          = 5 seconds
    max-lifetime             = 30 minutes   # keep below the DB/LB idle cutoff
    leak-detection-threshold = 10 seconds
  }

  auth {
    # Security-critical and environment-specific: required, no insecure defaults.
    issuer   = ${AUTH_ISSUER}
    audience = ${AUTH_AUDIENCE}
    jwks-uri = ${AUTH_JWKS_URI}

    # RFC 9449 DPoP sender-constrained tokens.
    dpop {
      enabled = true
      enabled = ${?DPOP_ENABLED}

      # Server-provided nonces (RFC 9449 §8-9) — the FAPI 2.0 fix for DPoP
      # Proof Replay. Stateless Duende-pattern nonces: an AES-GCM-encrypted
      # server timestamp, no shared store needed.
      nonce {
        enabled = true
        enabled = ${?DPOP_NONCE_ENABLED}
        # base64-encoded 16/24/32-byte AES key, shared by every node via the
        # secret manager. Absent → an ephemeral per-process key (single-node /
        # dev only; the boot logs a warning).
        key = ${?DPOP_NONCE_KEY}
        # Retired minting keys still accepted while rotating `key`; drop each
        # one nonce-lifetime after the roll.
        previous-keys = []
        lifetime = 5 minutes
      }
    }

    # RFC 7662 token introspection against the AS: immediate cluster-wide
    # revocation without a shared denylist. Fails closed; adds a network hop
    # bounded by request-timeout and amortised by cache-ttl.
    introspection {
      enabled = false
      enabled = ${?AUTH_INTROSPECTION_ENABLED}
      # Required when enabled (the boot fails otherwise); https only.
      endpoint      = ${?AUTH_INTROSPECTION_ENDPOINT}
      client-id     = ${?AUTH_INTROSPECTION_CLIENT_ID}
      client-secret = ${?AUTH_INTROSPECTION_CLIENT_SECRET}
      cache-ttl       = 10 seconds  # worst-case revocation latency; 0 disables caching
      request-timeout = 2 seconds   # a stalled AS fails closed, never pins threads
    }
  }

  # Named rate-limit policies for @RateLimited (resolved by http.RateLimitRegistry).
  # Token-bucket semantics: `permits` refill continuously over `window`.
  rate-limits {
    default { permits = 100, window = 1 minute }
    # Token endpoints are abuse magnets and each hit costs crypto work: keep tight.
    token   { permits = 10,  window = 1 minute }
  }

  # Distributed token-revocation store (Sage Redis/Valkey client).
  redis {
    mode  = standalone          # standalone | cluster
    mode  = ${?REDIS_MODE}
    nodes = [ { host = "localhost", port = 6379 } ]
    # nodes = [ {host=r1,port=6379}, {host=r2,port=6379} ]  # cluster seeds
    username = "default"
    username = ${?REDIS_USERNAME}
    # No default: in production REDIS_PASSWORD is required; omit it only for local dev.
    password = ${?REDIS_PASSWORD}
    database = 0
    tls      = false            # set true (and provide a real password) in production
    tls      = ${?REDIS_TLS}
    client-name     = "auth-middleware"
    connect-timeout = 10 seconds
    ping-interval   = 60 seconds
    ping-timeout    = 30 seconds
  }
}

# Guice wiring for the Play (Java) annotation middleware. Reads the same
# app.auth.* tree as the Scala stack, so both share one source of truth.
play.modules.enabled += "auth.AuthModule"
